name: Build and Push Docker Images

on:
  push:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build Backend
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/library-radar-backend:latest ./backend

      - name: Build Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/library-radar-frontend:latest ./frontend

      - name: Push Images
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/library-radar-backend:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/library-radar-frontend:latest