services:
  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ADMIN_TOKEN_SECRET: ${ADMIN_TOKEN_SECRET}
      ADMIN_TOKEN_TTL_SECONDS: ${ADMIN_TOKEN_TTL_SECONDS}
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
    environment:
      PORT: 4200
      NODE_ENV: production
      BACKEND_API_URL: http://backend:4000
    ports:
      - "4200:4200"
    depends_on:
      - backend
